server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.routes[0].id=machine-service
spring.cloud.gateway.routes[0].uri=lb://machine-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/machine/**

spring.cloud.gateway.routes[1].id=production-service
spring.cloud.gateway.routes[1].uri=lb://production-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/production/**

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:3000
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true

logging.level.org.springframework.cloud.gateway=DEBUG

management.endpoints.web.exposure.include=*

